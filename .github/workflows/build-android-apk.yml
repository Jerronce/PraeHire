name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - "apk-shell/**"
      - "capacitor.config.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create APK shell
        run: |
          mkdir -p apk-shell
          cat > apk-shell/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>PraeHire</title>
            </head>
            <body>Opening PraeHire...</body>
          </html>
          HTML

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json <<'JSON'
          {
            "appId": "com.praehire.app",
            "appName": "PraeHire",
            "webDir": "apk-shell",
            "server": {
              "url": "https://praehire-ai.web.app",
              "cleartext": false
            },
            "android": {
              "allowMixedContent": false
            }
          }
          JSON

      - name: Generate Android project
        run: npx cap add android

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk PraeHire-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PraeHire-debug-apk
          path: PraeHire-debug.apk
