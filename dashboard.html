<script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    
    // FIXED: Pointing to your actual working script at the root
    import './dashboard_new.js'; 

    const ADMIN_EMAIL = "jerronce101@gmail.com".toLowerCase();

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const email = (user.email || '').toLowerCase();
      // Allow admin or check payment
      if (email !== ADMIN_EMAIL) {
        // For now, we'll keep this simple so you can test
        console.log("User verified:", email);
      }
    });

    // Logout Logic
    window.doLogout = function() {
      signOut(auth).then(() => {
        window.location.href = 'login.html';
      }).catch((error) => {
        console.error("Logout error:", error);
        window.location.href = 'login.html';
      });
    };
  </script>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const sidebarNavItems = document.querySelectorAll('.sidebar-nav .nav-item');
    const mobileMenuItems = document.querySelectorAll('.mobile-menu-item[data-tab]');

    function activateTab(tabName) {
      tabs.forEach(t => t.classList.toggle('active', t.id === 'tab-' + tabName));
      sidebarNavItems.forEach(i => i.classList.toggle('active', i.dataset.tab === tabName));
      mobileMenuItems.forEach(i => i.classList.toggle('active', i.dataset.tab === tabName));
    }

    sidebarNavItems.forEach(item => {
      item.addEventListener('click', () => activateTab(item.dataset.tab));
    });

    mobileMenuItems.forEach(btn => {
      btn.addEventListener('click', () => {
        activateTab(btn.dataset.tab);
        document.getElementById('mobileMenu').classList.remove('open');
      });
    });

    document.getElementById('mobileMenuToggle')?.addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.toggle('open');
    });

    // Attach logout to buttons
    document.getElementById('logoutBtn')?.addEventListener('click', () => window.doLogout());
    document.getElementById('mobileLogout')?.addEventListener('click', () => window.doLogout());
  </script>
</body>
</html>
