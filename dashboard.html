<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PraeHire Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <div class="app">
    <main class="content">
      <div id="userGreeting" class="greeting">Hello! 👋</div>
      
      <section id="tab-resume" class="tab active">
        <h2>Resume Tailor</h2>
        <input type="file" id="resumeFile" accept=".pdf">
        <textarea id="jobDescInput" placeholder="Paste Job Description"></textarea>
        <button id="tailorResumeBtn" class="btn-primary">Tailor Resume with AI</button>
        <textarea id="optimizedResume" placeholder="Result here..."></textarea>
      </section>
    </main>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    
    // Auth Guard
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        console.log("Logged in:", user.email);
      }
    });

    // Load the Brain Logic
    import('./dashboard_new.js').then(() => {
      console.log("AI Logic connected successfully.");
    }).catch(err => {
      console.error("Path error: dashboard_new.js not found at root.");
    });
  </script>

  <script>
    // Tab switching logic
    const tabs = document.querySelectorAll('.tab');
    const navItems = document.querySelectorAll('.nav-item, .mobile-menu-item');

    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const target = item.dataset.tab;
        tabs.forEach(t => t.classList.toggle('active', t.id === 'tab-' + target));
      });
    });
  </script>
</body>
</html>
