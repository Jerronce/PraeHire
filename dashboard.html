<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PraeHire Dashboard | Global Architect v7.0</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    /* GLOBAL THEME */
    body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; }
    h2, h3, strong { color: #ffffff !important; }
    
    .tab-nav { display: flex; gap: 10px; margin: 25px 0; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    .tab-btn { padding: 12px 24px; cursor: pointer; border: none; background: #1e293b; color: #94a3b8; border-radius: 8px; font-weight: bold; transition: 0.3s; }
    .tab-btn.active { background: #3b82f6; color: white; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4); }
    
    .tab-content { display: none; padding-bottom: 40px; }
    .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* SCORE & ROADMAP BOX */
    .score-container { margin-top: 20px; display: none; background: #1e293b; padding: 25px; border-radius: 16px; border: 1px solid #3b82f6; }
    .progress-bg { background: #334155; height: 14px; border-radius: 10px; overflow: hidden; margin: 15px 0; }
    #progressBar { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #10b981); transition: width 1s ease-in-out; }
    #aiRoadmap { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; padding: 15px; border-radius: 12px; margin-top: 15px; color: #f1f5f9; font-size: 14px; line-height: 1.6; }

    /* UI COMPONENTS */
    .upload-box { border: 2px dashed #3b82f6; padding: 30px; border-radius: 16px; text-align: center; background: rgba(30, 41, 59, 0.5); }
    .manual-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 14px; }
    .result-area { width: 100%; height: 400px; margin-top: 12px; border-radius: 16px; padding: 20px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-family: monospace; line-height: 1.7; font-size: 14px; display: none; }
    .result-area.active { display: block; }

    #systemLogs { margin-top: 20px; background: #000; color: #10b981; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 13px; height: 100px; overflow-y: auto; border-left: 4px solid #3b82f6; }
  </style>
</head>
<body>
  <div class="app" style="max-width: 900px; margin: auto; padding: 20px;">
    <main class="content">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div id="userGreeting" style="font-size: 28px; font-weight: 800;">PraeHire AI v7.0 👋</div>
        <button id="logoutBtn" style="background: transparent; color: #ef4444; border: 2px solid #ef4444; cursor: pointer; padding: 8px 20px; border-radius: 10px; font-weight: 700;">Logout</button>
      </div>

      <nav class="tab-nav">
        <button class="tab-btn active" onclick="openTab('tab-resume')">Resume & Roadmap</button>
        <button class="tab-btn" onclick="openTab('tab-interview')">AI Interviewer</button>
        <button class="tab-btn" onclick="openTab('tab-apply')">Opportunity Finder</button>
      </nav>

      <section id="tab-resume" class="tab-content active">
        <h2>Career Re-Engineering</h2>
        
        <div class="upload-box">
            <label for="resumeFile" style="cursor: pointer; color: #3b82f6; font-weight: 800;">📁 Upload CV (PDF)</label>
            <input type="file" id="resumeFile" accept=".pdf" style="display: none;">
            <p id="fileName" style="font-size: 13px; color: #64748b; margin-top: 10px;">Ready to scan...</p>
        </div>

        <div class="manual-form" style="background: #1e293b; padding: 20px; border-radius: 16px; border: 1px solid #334155; margin-top: 15px;">
            <input type="text" id="userName" class="manual-input" placeholder="Full Name">
            <input type="text" id="userTitle" class="manual-input" placeholder="Target Role">
            <textarea id="userExperience" class="manual-input" style="height: 100px;" placeholder="Paste bio or skills..."></textarea>
        </div>

        <div style="margin: 25px 0;">
            <label><strong>Target Job Description:</strong></label>
            <textarea id="jobDescInput" style="width: 100%; height: 140px; margin-top: 10px; border-radius: 12px; padding: 15px; border: 1px solid #334155; background: #1e293b; color: white;" placeholder="Paste the Job Description here..."></textarea>
        </div>

        <button id="tailorResumeBtn" onclick="tailorResume()" style="background: #3b82f6; color: white; padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; width: 100%; font-size: 17px;">🚀 Optimize Entire Career Package</button>
        
        <div id="scoreSection" class="score-container">
            <div style="display: flex; justify-content: space-between;">
                <span style="font-weight: 800; color: #fff;">MATCH SCORE</span>
                <span id="scoreText" style="color: #10b981; font-weight: 800;">0%</span>
            </div>
            <div class="progress-bg"><div id="progressBar"></div></div>
            
            <div id="roadmapBox">
                <strong style="color: #10b981; display: block; margin-top: 10px;">🗺️ 4-Week Skills Roadmap:</strong>
                <div id="aiRoadmap">Analysis pending...</div>
            </div>
        </div>

        <div style="margin-top: 35px;">
            <nav class="tab-nav" style="border-bottom: 2px solid #334155;">
                <button class="tab-btn active" onclick="switchResult('optimizedResume', this)">📄 Optimized CV</button>
                <button class="tab-btn" onclick="switchResult('coverLetterText', this)">✉️ Cover Letter</button>
            </nav>
            <textarea id="optimizedResume" class="result-area active" readonly></textarea>
            <textarea id="coverLetterText" class="result-area" readonly></textarea>
            
            <div id="actionButtons" style="display: none; gap: 10px; margin-top: 10px; justify-content: flex-end;">
                <button id="downloadBtn" style="background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700;">Download .txt</button>
            </div>
        </div>

        <div id="systemLogs">> PraeHire Global v7.0 Online.</div>
      </section>

      <section id="tab-interview" class="tab-content">
          </section>
      <section id="tab-apply" class="tab-content">
          </section>

    </main>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js'; 
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    window.openTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    };

    window.switchResult = function(id, btn) {
        document.querySelectorAll('.result-area').forEach(r => r.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = 'login.html'; } 
      else {
        document.getElementById('userGreeting').innerText = `Welcome, ${user.email.split('@')[0]}!`;
      }
    });

    import('./prae_logic.js').then((m) => { console.log("🧠 PraeHire Logic Connected."); });
  </script>
</body>
</html>
