<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PraeHire Dashboard | CTO Edition</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #f0f0f0; border-radius: 5px; font-weight: bold; }
    .tab-btn.active { background: #007bff; color: white; }
    .tab-content { display: none; animation: fadeIn 0.3s; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    #interviewChat { height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; background: #fff; border-radius: 8px; margin-bottom: 10px; }
    #systemLogs { margin-top: 20px; background: #1e1e1e; color: #00ff00; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; height: 100px; overflow-y: auto; border: 1px solid #444; }
  </style>
</head>
<body>
  <div class="app">
    <main class="content">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div id="userGreeting" class="greeting" style="font-size: 24px; font-weight: bold;">Hello! 👋</div>
        <button id="logoutBtn" style="background: transparent; color: red; border: 1px solid red; cursor: pointer; padding: 5px 15px; border-radius: 5px;">Logout</button>
      </div>

      <nav class="tab-nav" style="margin-top: 20px;">
        <button class="tab-btn active" onclick="openTab('tab-resume')">Resume Tailor</button>
        <button class="tab-btn" onclick="openTab('tab-interview')">AI Interviewer</button>
        <button class="tab-btn" onclick="openTab('tab-apply')">Auto-Apply Helper</button>
      </nav>

      <section id="tab-resume" class="tab-content active">
        <h2 style="color: #333;">AI Resume Re-engineering</h2>
        <div style="margin: 15px 0;">
            <label><strong>1. Upload Resume (PDF):</strong></label><br>
            <input type="file" id="resumeFile" accept=".pdf" style="margin-top: 10px;">
        </div>
        <div style="margin: 15px 0;">
            <label><strong>2. Job Description:</strong></label><br>
            <textarea id="jobDescInput" style="width: 100%; height: 120px; margin-top: 10px; border-radius: 8px; padding: 10px; border: 1px solid #ccc;" placeholder="Paste Job Description here..."></textarea>
        </div>
        <button id="tailorResumeBtn" type="button" style="background: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;">Tailor Resume with AI</button>
        
        <div style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label><strong>3. AI Optimized Result:</strong></label>
                <div id="actionButtons" style="display: none; gap: 10px;">
                    <button onclick="downloadAsPDF()" style="background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">📥 Download</button>
                    <button onclick="shareToLinkedIn()" style="background: #0077b5; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">🔗 Share</button>
                </div>
            </div>
            <textarea id="optimizedResume" style="width: 100%; height: 180px; margin-top: 10px; border-radius: 8px; padding: 10px; border: 1px solid #ccc; background: #fdfdfd;" placeholder="AI optimized resume will appear here..." readonly></textarea>
        </div>

        <div id="systemLogs">> System initialized. Waiting for CTO input...</div>
      </section>

      <section id="tab-interview" class="tab-content">
        <h2>AI Mock Interview</h2>
        <div id="interviewChat"><p><em>AI: Upload your CV and click "Start Interview" to begin...</em></p></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="interviewInput" placeholder="Type your response..." style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
            <button id="sendInterviewBtn" style="background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Send</button>
        </div>
      </section>

      <section id="tab-apply" class="tab-content">
        <h2>One-Click Apply Helper</h2>
        <input type="text" id="jobSearch" placeholder="Role (e.g. Frontend Engineer)" style="width: 70%; padding: 10px; margin-bottom: 10px;">
        <button onclick="searchJobs()" style="padding: 10px; background: #333; color: white; border-radius: 5px;">Search Jobs</button>
        <div style="margin-top: 20px; padding: 20px; background: #eee; border-radius: 10px; text-align: center;">
            <p>Job results will populate here.</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js'; 
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    window.openTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    };

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = 'login.html');
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = 'login.html'; } 
      else {
        const greeting = document.getElementById('userGreeting');
        if (greeting) greeting.innerText = `Hello, ${user.email.split('@')[0]}! 👋`;
      }
    });

    import('./prae_logic.js').then(() => console.log("🧠 PraeHire Logic Connected."));
  </script>
</body>
</html>
