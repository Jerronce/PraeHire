<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PraeHire Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <div class="app">
    <main class="content">
      <div id="userGreeting" class="greeting" style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">Hello! 👋</div>
      
      <section id="tab-resume" class="tab active">
        <h2 style="color: #333;">Resume Tailor</h2>
        
        <div style="margin: 20px 0;">
            <label><strong>1. Upload Resume (PDF):</strong></label><br>
            <input type="file" id="resumeFile" accept=".pdf" style="margin-top: 10px;">
        </div>
        
        <div style="margin: 20px 0;">
            <label><strong>2. Paste Job Description:</strong></label><br>
            <textarea id="jobDescInput" style="width: 100%; height: 150px; margin-top: 10px; border-radius: 8px; padding: 10px; border: 1px solid #ccc;" placeholder="Paste Job Description here..."></textarea>
        </div>
        
        <button id="tailorResumeBtn" type="button" style="background: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Tailor Resume with AI</button>
        <button id="logoutBtn" style="margin-top: 50px; background: transparent; color: red; border: 1px solid red; cursor: pointer; padding: 5px 10px; border-radius: 5px;">Logout</button>
        <div style="margin-top: 30px;">
            <label><strong>3. AI Optimized Result:</strong></label><br>
            <textarea id="optimizedResume" style="width: 100%; height: 200px; margin-top: 10px; border-radius: 8px; padding: 10px; border: 1px solid #ccc;" placeholder="Result here..." readonly></textarea>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js'; 
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

document.getElementById('logoutBtn')?.addEventListener('click', () => {
    signOut(auth).then(() => {
        window.location.href = 'login.html';
    });
});
    
    console.log("🛠️ Dashboard Initializing...");

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        console.log("✅ Jerry Authenticated");
        const greeting = document.getElementById('userGreeting');
        if (greeting) greeting.innerText = `Hello, ${user.email.split('@')[0]}! 👋`;
      }
    });

    // THE HANDSHAKE: Loading the logic file we renamed
    import('./prae_logic.js')
      .then(() => console.log("🧠 Logic Connected."))
      .catch(err => console.error("❌ Failed to load prae_logic.js", err));
  </script>
</body>
</html>
