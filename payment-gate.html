<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | PraeHire Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .checkout-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-box { margin-bottom: 25px; }
        .logo-box img { height: 50px; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5)); }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 15px; margin-bottom: 30px; }

        .price-box {
            background: rgba(59, 130, 246, 0.07);
            border: 1px solid var(--accent);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .amount { font-size: 48px; font-weight: 800; color: #fff; }
        .currency { font-size: 18px; color: #94a3b8; }

        .features-list {
            text-align: left;
            margin: 20px 0;
            padding: 0;
            list-style: none;
        }

        .features-list li {
            margin-bottom: 12px;
            font-size: 14px;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .features-list li::before { content: "✦"; color: var(--accent); font-weight: bold; }

        .pay-btn {
            background: #fff;
            color: #000;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .pay-btn:hover {
            transform: translateY(-3px);
            background: var(--accent);
            color: #fff;
        }

        .footer-note { margin-top: 20px; font-size: 12px; color: #64748b; }
        a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

    <div class="checkout-card">
        <div class="logo-box">
            <img src="assets/logo.png" alt="PraeHire">
        </div>
        <h1>Complete Purchase</h1>
        <p>Subscribe to the Professional Career Suite.</p>

        <div class="price-box">
            <div class="amount">$149.00</div>
            <div class="currency">per month / USD</div>
            
            <ul class="features-list">
                <li>AI Resume Re-Engineering</li>
                <li>4-Week Skill Roadmap</li>
                <li>Mock Technical Interviews</li>
                <li>Cover Letter Suite</li>
            </ul>
        </div>

        <button onclick="makePayment()" class="pay-btn">Activate My Account</button>
        
        <div class="footer-note">
            Secure payment powered by <strong>Flutterwave</strong>.<br>
            <a href="login.html">Return to Login</a>
        </div>
    </div>

    <script src="https://checkout.flutterwave.com/v3.js"></script>
    <script>
      function makePayment() {
        // Retrieve email from login/signup memory
        const userEmail = localStorage.getItem('userEmail') || "guest@praehire.com";

        FlutterwaveCheckout({
          public_key: "FLWPUBK-16a72bd54f4eb876e6a705d899b049d8-X", // Corrected key
          tx_ref: "praehire-" + Date.now(),
          amount: 149, // Updated to Professional Price
          currency: "USD",
          payment_options: "card, banktransfer, ussd",
          customer: {
            email: userEmail,
            name: "PraeHire Professional User",
          },
          callback: function (data) {
            if (data.status === "successful") {
                localStorage.setItem('paymentVerified', 'true');
                window.location.href = "dashboard.html";
            }
          },
          customizations: {
            title: "PraeHire Professional",
            description: "Full AI Career Architect Access",
            logo: "https://praehire.web.app/assets/logo.png",
          },
        });
      }
    </script>
</body>
</html>
