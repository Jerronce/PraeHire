<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe to PraeHire | Professional Tier</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #030712;
            background-image: radial-gradient(circle at top, rgba(59, 130, 246, 0.1), transparent);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .payment-gate {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 { font-weight: 800; margin-bottom: 10px; background: linear-gradient(90deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pricing-box { margin: 30px 0; padding: 20px; border-radius: 16px; background: rgba(59, 130, 246, 0.05); border: 1px solid #3b82f6; }
        h2 { font-size: 32px; margin: 10px 0; }
        ul { text-align: left; list-style: none; padding: 0; margin: 20px 0; }
        li { margin-bottom: 12px; font-size: 15px; color: #cbd5e1; }
        .subscribe-btn {
            background: #fff;
            color: #000;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .subscribe-btn:hover { background: #3b82f6; color: #fff; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="payment-gate">
        <h1>🚀 Unlock Your Career</h1>
        <p style="color: #94a3b8;">Join the elite tier of global applicants.</p>
        
        <div class="pricing-box">
            <h2>$149.00 <span style="font-size: 16px; color: #94a3b8;">/ Month</span></h2>
            <ul>
                <li>✅ AI Resume Re-Engineering</li>
                <li>✅ 4-Week Personal Skill Roadmap</li>
                <li>✅ AI Cover Letter Generation</li>
                <li>✅ Interactive AI Technical Interviews</li>
                <li>✅ Global Opportunity Finder</li>
            </ul>
            <button onclick="initiatePaymentThenSignup()" class="subscribe-btn">
                Secure Professional Access
            </button>
        </div>
        
        <p><a href="login.html" style="color: #3b82f6; text-decoration: none; font-weight: 600;">Already have an account? Login</a></p>
    </div>

    <script src="https://checkout.flutterwave.com/v3.js"></script>
    <script>
        // CTO NOTE: Using the Professional v7.0 Price point
        const FLUTTERWAVE_PUBLIC_KEY = 'FLWPUBK-16a72bd54f4eb876e6a705d899b049d8-X';
        const MONTHLY_PRICE = 149; 
        
        function initiatePaymentThenSignup() {
            // Get the email from the login page memory if available
            const savedEmail = localStorage.getItem('userEmail');
            const email = savedEmail || prompt('Enter your email address to secure your payment:');
            
            if (!email) return;
            
            FlutterwaveCheckout({
                public_key: FLUTTERWAVE_PUBLIC_KEY,
                tx_ref: 'praehire-v7-' + Date.now(),
                amount: MONTHLY_PRICE,
                currency: 'USD',
                payment_options: 'card, banktransfer, ussd',
                customer: {
                    email: email,
                    name: 'PraeHire Professional User',
                },
                customizations: {
                    title: 'PraeHire Global Professional',
                    description: 'Full Career Evolution Suite Access',
                    logo: 'https://praehire.web.app/assets/logo.png',
                },
                callback: function(data) {
                    if (data.status === 'successful') {
                        localStorage.setItem('paymentStatus', 'paid');
                        localStorage.setItem('userEmail', email);
                        addLog("✅ Payment verified. Redirecting to Dashboard...");
                        window.location.href = 'dashboard.html';
                    }
                },
            });
        }
    </script>
</body>
</html>
